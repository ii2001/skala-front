<!DOCTYPE html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나의 기본 정보와 관심사, 올해의 계획 및 개발자로서의 목표를 소개하는 페이지입니다.">
    <title>나의 소개</title>
  </head>
  <body>
    <header>
      <h1>안녕하세요! 저를 소개합니다</h1>
      <p>저의 관심사와 계획, 앞으로 이루고 싶은 목표를 간단히 소개합니다.</p>
    </header>
    <main>
      <article>
        <section>
          <h2>기본 소개</h2>
          <p>저에 대한 기본적인 정보를 소개할 예정입니다.</p>
        </section>
        <section>
          <h2>내가 좋아하는 음식</h2>
          <p>제가 즐겨 먹는 음식과 그 이유를 소개할 예정입니다.</p>
        </section>
        <section>
          <h2>올해 할 일</h2>
          <p>올해 꼭 실천하고 싶은 계획을 소개할 예정입니다.</p>
        </section>
        <section>
          <h2>나를 설명하는 단어들</h2>
          <p>저의 성격과 특징을 잘 나타내는 단어들을 소개할 예정입니다.</p>
        </section>
        <section>
          <h2>개발자로서의 목표</h2>
          <p>앞으로 어떤 개발자로 성장하고 싶은지 소개할 예정입니다.</p>
        </section>
      </article>
    </main>
    <footer>
      <small>SKALA-FRONT HTML 기초 과제로 작성한 문서입니다.</small>
    </footer>
  </body>
</html>
